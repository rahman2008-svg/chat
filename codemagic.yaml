workflows:
  android-apk-build:
    name: Android APK Build

    max_build_duration: 60

    environment:
      java: 17

    scripts:
      - name: Show Flutter version
        script: |
          flutter --version

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
